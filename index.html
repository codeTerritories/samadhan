    <!-- 3. FAQPage — Highest-impact for "People Also Ask" boxes in Google.
         Targets the most-searched civic helpline queries in India. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the electricity complaint helpline number in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dial 1912 (24×7, toll-free) — the national electricity complaint helpline (DISCOM). State-specific numbers: Delhi BSES/BYPL 19123, Mumbai MSEDCL 1800-200-3435, Maharashtra MSEDCL 1800-102-3435, Karnataka BESCOM 1912, Tamil Nadu TANGEDCO 1912. For unresolved complaints escalate to your State Electricity Regulatory Commission (SERC) or file on CPGRAMS at pgportal.gov.in."
          }
        },
        {
          "@type": "Question",
          "name": "What is the water supply complaint helpline number in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dial 1916 (24×7, toll-free) — the national Jal Shakti / Jal Board water supply helpline. State-specific portals: Delhi Jal Board djb.gov.in, Maharashtra MJP 1800-233-0033, UP Jal Nigam 1800-180-5555. For rural water supply under Jal Jeevan Mission, call 1916. Escalate persistent issues to state PHE/PHED department or CPGRAMS."
          }
        },
        {
          "@type": "Question",
          "name": "How do I file a police complaint or FIR online in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dial 100 for police emergency or 112 for all emergencies. To file an FIR online, visit your state police portal (e.g., delhipolice.gov.in, citizenportal.mahapolice.gov.in, ksp.karnataka.gov.in). Under CrPC Section 154(3), police must register your FIR — if refused, approach the SP of your district in writing. For cyber crime complaints dial 1930 or visit cybercrime.gov.in."
          }
        },
        {
          "@type": "Question",
          "name": "How do I complain about a road pothole in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For National Highways call NHAI helpline 1033 or use the NHAI One portal. For state roads contact your state PWD portal or dial the CM helpline (varies by state — e.g., Delhi PWD 1908, Maharashtra PWD, UP Setu Helpline 1800-180-4167). For city roads file a complaint with your Municipal Corporation (Nagar Nigam). You can also report potholes via the Swachhata-MoHUA app (1969)."
          }
        },
        {
          "@type": "Question",
          "name": "What is the garbage and sanitation complaint number in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dial 1969 or use the Swachhata-MoHUA app to report garbage dumping, missed garbage collection, blocked drains, or open defecation under the Swachh Bharat Mission. You can also contact your local Municipal Corporation (Nagar Nigam/Nagar Palika) directly. For city-specific: Delhi MCD mcdonline.nic.in, Mumbai BMC 1916, Bengaluru BBMP 080-22660000."
          }
        },
        {
          "@type": "Question",
          "name": "What is CPGRAMS and how do I file a complaint on it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CPGRAMS (Centralised Public Grievance Redress and Monitoring System) at pgportal.gov.in is India's official national online grievance portal. To file: 1) Go to pgportal.gov.in 2) Register or login with mobile OTP 3) Click 'Lodge Public Grievance' 4) Select Ministry/Department 5) Describe your problem 6) Submit — you get a tracking registration number. The nodal officer must respond within 30 days."
          }
        },
        {
          "@type": "Question",
          "name": "How do I escalate a civic complaint that has not been resolved in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Follow this escalation path: 1) Local level — File with DISCOM/Jal Board/Municipal body 2) State level — File with State Electricity/Water Regulatory Commission or State CM Helpline 3) Central level — File on CPGRAMS at pgportal.gov.in 4) RTI — File RTI at rtionline.gov.in to get information on your complaint status. For consumer disputes, approach State Consumer Disputes Redressal Commission or National Consumer Helpline 1800-11-4000."
          }
        },
        {
          "@type": "Question",
          "name": "What is the banking fraud or UPI fraud complaint helpline in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For UPI fraud or banking fraud: immediately call National Cyber Crime Helpline 1930 (24×7) or file at cybercrime.gov.in. Also call your bank's 24×7 customer care to block your card/account. For banking service complaints: RBI Integrated Ombudsman Scheme helpline 14448, or file at bankingombudsman.rbi.org.in. NPCI helpline for UPI: 1800-120-1740."
          }
        },
        {
          "@type": "Question",
          "name": "How do I apply for a ration card or fix ration issues in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For ration card issues: Contact your state Food &amp; Civil Supplies Department portal, or your District Supply Officer (DSO). National Food Security Helpline: 14445. You can check ration card status on mera.pmgsy.nic.in or your state's PDS portal (e.g., ration.jharkhand.gov.in, epds.tn.gov.in). For urgent ration denial, contact your Block Development Officer (BDO) or file on CPGRAMS."
          }
        },
        {
          "@type": "Question",
          "name": "Is Samadhan an official government website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Samadhan is an independent, non-profit citizen project. It is not affiliated with any government body. Samadhan aggregates information about official government helplines and portals to help citizens find the right channel quickly. All helpline numbers and portal links on Samadhan point directly to official government websites. The service is completely free, requires no login, and stores no personal data."
          }
        }
      ]
    }
    </script>
